version: '3.9'
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smart_wms
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./apps/backend
    depends_on:
      - db
    environment:
      DATABASE_URL: mysql://root:root@db:3306/smart_wms
    ports:
      - '3000:3000'

  frontend:
    build: ./apps/frontend
    ports:
      - '5173:5173'

volumes:
  db_data:
